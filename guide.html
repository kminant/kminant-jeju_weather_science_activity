실내 전시

</div>

</h1>

<p id="subtitle">

</p>

<main>

<section class="card">

<div class="section-title">

</div>

</p>

</section>

<section class="card">

<div class="section-title">

</div>

<input

id="question"

type="text"

placeholder="궁금한 점을 입력하세요.">

<button id="askBtn">

</button>

<div id="answer">

</div>

</section>

<section class="card">

<div class="section-title">

❓ 퀴즈

<div id="quiz">

</div>

<button id="prevBtn">
