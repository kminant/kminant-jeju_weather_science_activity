<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>제주기상과학홍보관</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>🌤 제주기상과학홍보관</h1>

<p>AI와 함께 배우는 기상·기후 체험</p>

</header>

<main>

<!-- 오늘의 날씨 -->

<section class="card">

<h2>📍 오늘의 제주 날씨</h2>

<div class="weather">

<p>🌡 기온 <span id="temp">--℃</span></p>

<p>💧 습도 <span id="humid">--%</span></p>

<p>🌬 풍속 <span id="wind">--m/s</span></p>

<p>🧭 풍향 <span id="dir">--</span></p>

<p>☔ 강수량 <span id="rain">--mm</span></p>

</div>

</section>

<!-- AI 추천 -->

<section class="card">

<h2>🤖 AI 추천</h2>

<p id="recommend">

오늘의 기상정보를 분석하고 있습니다.

</p>

</section>

<!-- 관람코스 -->

<section class="card">

<h2>🚶 관람 코스</h2>

<label>

<input type="radio"

name="course"

value="inside"

checked>

홍보관만 관람

</label>

<br><br>

<label>

<input type="radio"

name="course"

value="outside">

홍보관 + 야외관측장비

</label>

<br><br>

<label>

<input type="radio"

name="course"

value="all">

홍보관 + 야외관측장비 + 공신정터

</label>

</section>

<!-- 참여자 -->

<section class="card">

<h2>👤 참여자</h2>

<label>

<input type="radio"

name="level"

value="elementary"

checked>

초등학생

</label>

<br><br>

<label>

<input type="radio"

name="level"

value="middle">

중·고등학생

</label>

<br><br>

<label>

<input type="radio"

name="level"

value="adult">

성인

</label>

</section>

<button id="startBtn">

체험 시작

</button>

</main>

<script src="js/main.js"></script>

</body>

</html>
