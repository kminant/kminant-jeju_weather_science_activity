<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>제주기상과학홍보관 AI 스마트 가이드</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ================= Header ================= -->

    <header class="header">

        <h1>☁️ 제주기상과학홍보관</h1>

        <p>AI 스마트 가이드</p>

        <span class="header-sub">
            실시간 제주 날씨와 함께 기상여행을 시작해보세요.
        </span>

    </header>

    <main>

        <!-- ================= 오늘의 제주 날씨 ================= -->

        <section class="card">

            <div class="section-title">
                📍 오늘의 제주 날씨
            </div>

            <div class="weather-main">

                <div class="temperature">

                    <div class="temp-title">
                        🌡 현재 기온
                    </div>

                    <div id="temp" class="temp-number">
                        --℃
                    </div>

                </div>

                <div class="temperature">

                    <div class="temp-title">
                        🥵 체감온도
                    </div>

                    <div id="feel" class="temp-number">
                        --℃
                    </div>

                </div>

            </div>

            <div class="weather-grid">

                <div class="weather-item">

                    <div class="weather-icon">💧</div>

                    <div class="weather-name">습도</div>

                    <div id="humid" class="weather-value">--%</div>

                </div>

                <div class="weather-item">

                    <div class="weather-icon">🌬</div>

                    <div class="weather-name">풍속</div>

                    <div id="wind" class="weather-value">--m/s</div>

                </div>

                <div class="weather-item">

                    <div class="weather-icon">🧭</div>

                    <div class="weather-name">풍향</div>

                    <div id="dir" class="weather-value">--</div>

                </div>

                <div class="weather-item">

                    <div class="weather-icon">☔</div>

                    <div class="weather-name">강수량</div>

                    <div id="rain" class="weather-value">--mm</div>

                </div>

            </div>

            <div class="weather-time">

                🕒 관측시각 :
                <span id="obsTime">
                    --
                </span>

            </div>

        </section>

        <!-- ================= AI 추천 ================= -->

        <section class="card">

            <div class="section-title">
                🤖 AI 기상도우미
            </div>

            <div class="ai-box">

                <div class="ai-avatar">

                    🤖

                </div>

                <div class="ai-bubble">

                    <p id="recommend">

                        오늘의 제주 날씨를 분석하고 있습니다.

                    </p>

                </div>

            </div>

        </section>

        <!-- ================= 오늘의 미션 ================= -->

        <section class="card">

            <div class="section-title">

                🎯 오늘의 기상 탐험

            </div>

            <p class="mission">

                현재 기온과 체감온도의 차이는
                몇 도일까요?

            </p>

            <button id="hintBtn" class="yellow-btn">

                💡 AI에게 힌트 받기

            </button>

        </section>

        <!-- ================= 관람코스 ================= -->

        <section class="card">

            <div class="section-title">

                🚶 어디까지 탐험할까요?

            </div>

            <div class="course-list">

                <button class="course selected"
                    data-course="inside">

                    <span class="badge">
                        실내
                    </span>

                    <div class="course-icon">

                        🏢

                    </div>

                    <div class="course-title">

                        제주기상과학홍보관

                    </div>

                    <div class="course-desc">

                        실내 기상·기후 전시를 관람합니다.

                    </div>

                    <div class="course-time">

                        ⏱ 약 20분

                    </div>

                </button>

                <button class="course"
                    data-course="outside">

                    <span class="badge green">
                        야외
                    </span>

                    <div class="course-icon">

                        🌳

                    </div>

                    <div class="course-title">

                        지상기상관측장비

                    </div>

                    <div class="course-desc">

                        실제 관측장비를 가까이에서 살펴봅니다.

                    </div>

                    <div class="course-time">

                        ⏱ 약 15분

                    </div>

                </button>

                <button class="course"
                    data-course="history">

                    <span class="badge orange">
                        역사
                    </span>

                    <div class="course-icon">

                        🏛

                    </div>

                    <div class="course-title">

                        역사문화공간

                    </div>

                    <div class="course-desc">

                        공신정터와 제주의 기상 역사를 알아봅니다.

                    </div>

                    <div class="course-time">

                        ⏱ 약 15분

                    </div>

                </button>

            </div>

        </section>

        <!-- ================= 참여자 ================= -->

        <section class="card">

            <div class="section-title">

                👤 참여자 선택

            </div>

            <div class="level-list">

                <button class="level selected"
                    data-level="elementary">

                    <div class="level-icon">

                        😀
                    </div>

                    <div class="level-title">

                        초등학생

                    </div>

                    <div class="level-desc">

                        쉽고 재미있는 설명으로 체험합니다.

                    </div>

                </button>

                <button class="level"
                    data-level="middle">

                    <div class="level-icon">

                        🧑

                    </div>

                    <div class="level-title">

                        중·고등학생

                    </div>

                    <div class="level-desc">

                        원리를 이해하며 탐구합니다.

                    </div>

                </button>

                <button class="level"
                    data-level="adult">

                    <div class="level-icon">

                        👨

                    </div>

                    <div class="level-title">

                        성인

                    </div>

                    <div class="level-desc">

                        기상과 기후를 깊이 있게 살펴봅니다.

                    </div>

                </button>

            </div>

        </section>

        <!-- ================= 시작 ================= -->

        <button id="startBtn">

            🚀 체험 시작하기

        </button>

        <p class="footer-text">

            AI 스마트 가이드는 실시간 제주 날씨를 바탕으로
            맞춤형 해설과 체험을 제공합니다.

        </p>

    </main>

    <script src="js/main.js"></script>

</body>

</html>
