<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>제주기상과학홍보관 AI 스마트 가이드</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <h1>☁️ 제주기상과학홍보관</h1>

        <p>AI와 함께 배우는 기상·기후 체험</p>

    </header>

    <main>

        <!-- ================= 오늘의 제주 날씨 ================= -->

<div class="weather-main">

    <div class="temperature">

        <div class="temp-title">
            🌡 현재 기온
        </div>

        <div id="temp" class="temp-number">
            --℃
        </div>

    </div>

    <div class="temperature">

        <div class="temp-title">
            🥵 체감온도
        </div>

        <div id="feel" class="temp-number">
            --℃
        </div>

    </div>

</div>

<div class="weather-grid">

    <div class="weather-item">

        <div class="weather-icon">💧</div>

        <div class="weather-name">습도</div>

        <div id="humid" class="weather-value">--%</div>

    </div>

    <div class="weather-item">

        <div class="weather-icon">🌬</div>

        <div class="weather-name">풍속</div>

        <div id="wind" class="weather-value">--m/s</div>

    </div>

    <div class="weather-item">

        <div class="weather-icon">🧭</div>

        <div class="weather-name">풍향</div>

        <div id="dir" class="weather-value">--</div>

    </div>

    <div class="weather-item">

        <div class="weather-icon">☔</div>

        <div class="weather-name">강수량</div>

        <div id="rain" class="weather-value">--mm</div>

    </div>

</div>

        <!-- ================= AI 추천 ================= -->

        <section class="card">

            <div class="section-title">

                🤖 AI 추천

            </div>

            <div id="recommend" class="recommend">

                오늘의 기상정보를 분석하고 있습니다.

            </div>

        </section>

        <!-- ================= 오늘의 기상 탐험 ================= -->

        <section class="card">

            <div class="section-title">

                🎯 오늘의 기상 탐험

            </div>

            <p class="mission">

                현재 기온과 체감온도의 차이는 얼마일까요?

            </p>

            <button id="hintBtn" class="yellow-btn">

                💡 AI에게 힌트 받기

            </button>

        </section>

        <!-- ================= 관람코스 ================= -->

        <section class="card">

            <div class="section-title">

                🚶 어디까지 탐험할까요?

            </div>

            <div class="course-list">

                <button class="course selected" data-course="inside">

                    <div class="course-icon">🏢</div>

                    <div class="course-title">

                        제주기상과학홍보관

                    </div>

                    <div class="course-desc">

                        실내 기상·기후 전시를 관람합니다.

                    </div>

                    <div class="course-time">

                        ⏱ 약 20분

                    </div>

                </button>

                <button class="course" data-course="outside">

                    <div class="course-icon">🌳</div>

                    <div class="course-title">

                        지상기상관측장비

                    </div>

                    <div class="course-desc">

                        실제 관측장비를 가까이에서 살펴봅니다.

                    </div>

                    <div class="course-time">

                        ⏱ 약 15분

                    </div>

                </button>

                <button class="course" data-course="history">

                    <div class="course-icon">🏛</div>

                    <div class="course-title">

                        역사문화공간

                    </div>

                    <div class="course-desc">

                        공신정터와 제주의 기상 역사를 알아봅니다.

                    </div>

                    <div class="course-time">

                        ⏱ 약 15분

                    </div>

                </button>

            </div>

        </section>

        <!-- ================= 참여자 ================= -->

        <section class="card">

            <div class="section-title">

                👤 참여자 선택

            </div>

            <div class="level-list">

                <button class="level selected" data-level="elementary">

                    <div class="level-icon">😀</div>

                    <div class="level-title">

                        초등학생

                    </div>

                    <div class="level-desc">

                        쉽고 재미있는 설명

                    </div>

                </button>

                <button class="level" data-level="middle">

                    <div class="level-icon">🧑</div>

                    <div class="level-title">

                        중·고등학생

                    </div>

                    <div class="level-desc">

                        탐구 중심 설명

                    </div>

                </button>

                <button class="level" data-level="adult">

                    <div class="level-icon">👨</div>

                    <div class="level-title">

                        성인

                    </div>

                    <div class="level-desc">

                        심화 해설 제공

                    </div>

                </button>

            </div>

        </section>

        <!-- ================= 시작 ================= -->

        <button id="startBtn">

            🚀 체험 시작하기

        </button>

    </main>

    <script src="js/main.js"></script>

</body>

</html>
