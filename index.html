<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>제주기상과학홍보관</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<header>

<h1>☁️ 제주기상과학홍보관</h1>

<p>AI와 함께 배우는 기상·기후 체험</p>

</header>

<main>

<!-- 날씨 -->

<section class="card">

<h2>📍 오늘의 제주 날씨</h2>

<div class="weather">

<div>🌡 기온 <span id="temp">--℃</span></div>

<div>🥵 체감온도 <span id="feel">--℃</span></div>

<div>💧 습도 <span id="humid">--%</span></div>

<div>🌬 풍속 <span id="wind">--m/s</span></div>

<div>🧭 풍향 <span id="dir">--</span></div>

<div>☔ 강수량 <span id="rain">--mm</span></div>

</div>

</section>

<!-- AI 추천 -->

<section class="card">

<h2>🤖 AI 추천</h2>

<p id="recommend">

오늘의 기상정보를 분석중입니다.

</p>

</section>

<!-- 오늘의 미션 -->

<section class="card">

<h2>🎯 오늘의 기상 탐험</h2>

<p>

현재 기온과 체감온도의 차이는

얼마일까요?

</p>

<button class="hint">

힌트 보기

</button>

</section>

<!-- 관람코스 -->

<section class="card">

<h2>🚶 관람코스</h2>

<div class="option-group">

<button class="option selected"
data-course="inside">
🏢 제주기상과학홍보관
</button>

<button class="option"
data-course="outside">
🌳 지상기상관측장비
</button>

<button class="option"
data-course="all">
🏛 역사문화공간
</button>

</div>

</section>

<!-- 참여자 -->

<section class="card">

<h2>👤 참여자</h2>

<div class="option-group">

<button class="level selected"

data-level="elementary">

😀 초등학생

</button>

<button class="level"

data-level="middle">

🧑 중·고등학생

</button>

<button class="level"

data-level="adult">

👨 성인

</button>

</div>

</section>

<button id="start">

🚀 체험 시작

</button>

</main>

<script src="js/main.js"></script>

</body>

</html>
